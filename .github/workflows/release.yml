name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: iso-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: iso-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: iso-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: iso-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/iso.exe ${{ matrix.artifact_name }}
          else
            mv target/${{ matrix.target }}/release/iso ${{ matrix.artifact_name }}
          fi

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
